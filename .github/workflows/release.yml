name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  #  Build Windows (.exe installer + portable)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build · Windows
    # windows-2022 ships with VS Build Tools 2022 — same as local build environment.
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install setuptools for node-gyp
        # Python 3.12+ removed distutils from stdlib. node-gyp (used to compile
        # native modules like cpu-features/ssh2) still imports distutils.
        # Installing setuptools provides the distutils compatibility shim —
        # exactly the same as the local machine where setuptools is present.
        run: pip install setuptools

      - name: Install dependencies
        # npm install triggers postinstall → "electron-builder install-app-deps"
        # which rebuilds native modules (node-pty, better-sqlite3, etc.) for Electron.
        run: npm install

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist-electron/win/*.exe
          retention-days: 1

  # ─────────────────────────────────────────────
  #  Build Linux (.AppImage + .deb)
  # ─────────────────────────────────────────────
  build-linux:
    name: Build · Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        # libsecret-1-dev  → required by keytar
        # libudev-dev      → required by serialport
        # rpm + libarchive-tools → allow building deb/AppImage
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsecret-1-dev libudev-dev rpm libarchive-tools

      - name: Install dependencies
        run: npm install

      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist-electron/linux/*.AppImage
            dist-electron/linux/*.deb
          retention-days: 1

  # ─────────────────────────────────────────────
  #  Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-assets/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: release-assets/

      - name: List release assets
        run: ls -lh release-assets/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ternix v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  #  Deploy download website to Firebase Hosting
  #  Runs after release is published so the site
  #  is always in sync with the latest version.
  #  The JS on the page fetches /releases/latest
  #  from the GitHub API — so even without a
  #  redeploy, new versions appear automatically.
  #  This job re-deploys to pick up any website
  #  source changes bundled with the release.
  # ─────────────────────────────────────────────
  deploy-website:
    name: Deploy Website · Firebase
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TERNIX_DEV }}
          channelId: live
          projectId: ternix-dev
